<svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGrad" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="faviconGlow" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="faviconGlowFilter">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square -->
  <rect width="52" height="52" rx="14" fill="url(#faviconGrad)"/>
  <!-- Inner glow overlay -->
  <rect width="52" height="52" rx="14" fill="url(#faviconGlow)"/>
  <!-- Subtle top highlight -->
  <rect x="8" y="4" width="36" height="18" rx="9" fill="white" opacity="0.08"/>

  <!-- Location pin body -->
  <circle cx="26" cy="22" r="9" fill="white" filter="url(#faviconGlowFilter)"/>
  <circle cx="26" cy="22" r="5.5" fill="url(#faviconGrad)"/>
  <!-- Pin tail -->
  <path d="M26 29 L22 37 Q26 40 30 37 Z" fill="white" opacity="0.95"/>

  <!-- Plug prongs (two small rectangles top of pin) -->
  <rect x="23" y="11" width="2.5" height="5" rx="1.2" fill="white" opacity="0.9"/>
  <rect x="26.5" y="11" width="2.5" height="5" rx="1.2" fill="white" opacity="0.9"/>

  <!-- Signal arcs -->
  <path d="M14 18 Q14 10 26 10 Q38 10 38 18" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M18 18 Q18 14 26 14 Q34 14 34 18" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
